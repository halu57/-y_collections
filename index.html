<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點開，就有收獲</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto_Serif_TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfbfa;       /* 溫潤的米白底色 */
            --text-color: #3e3a36;     /* 深炭灰文字 */
            --accent-color: #607254;   /* 苔綠色 */
            --border-color: #e8e5e0;   /* 淺灰線條 */
        }
        
        body {
            font-family: 'Noto Serif TC', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            margin: 0;
            padding: 50px 24px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 650px;
            width: 100%;
        }

        /* 文青風標頭 */
        header {
            text-align: center;
            margin-bottom: 60px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 6px;
            margin-bottom: 12px;
            color: var(--text-color);
        }

        header .subtitle {
            font-size: 0.95rem;
            color: #8c857b;
            letter-spacing: 3px;
        }

        /* 文章列表資料庫 */
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .article-item {
            display: flex;
            align-items: flex-start;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: #ffffff;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .article-item:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(96, 114, 84, 0.1);
        }

        .icon {
            font-size: 1.6rem;
            margin-right: 18px;
            margin-top: -2px;
            min-width: 35px;
            text-align: center;
        }

        .content {
            flex: 1;
        }

        .title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-color);
            line-height: 1.5;
        }

        .url-box {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            color: var(--accent-color);
        }

        .url-text {
            word-break: break-all;
            text-decoration: underline;
        }

        /* 載入中與錯誤訊息提示 */
        .status-msg {
            text-align: center;
            color: #8c857b;
            font-style: italic;
            padding: 40px 0;
        }

        footer {
            text-align: center;
            margin-top: 100px;
            font-size: 0.85rem;
            color: #b5aea4;
            letter-spacing: 2px;
        }

        @media (max-width: 480px) {
            body { padding: 30px 16px; }
            header { margin-bottom: 40px; }
            header h1 { font-size: 1.8rem; letter-spacing: 4px; }
            .article-item { padding: 16px; }
            .title { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>點開，就有收獲</h1>
            <div class="subtitle">閱讀台灣的風土與生態智慧</div>
        </header>

        <main class="article-list" id="article-container">
            <div class="status-msg">正在翻閱文章札記...</div>
        </main>

        <footer>
            <p>© 點開，就有收獲 ・ 文章資料庫</p>
        </footer>
    </div>

    <script>
        // ⚠️ 請在下方單引號內，替換上你的 Google 試算表 ID
        const SPREADSHEET_ID = '1HHu0LPLLwQk6u5-SMmCba_7IoyHJRhlbFaFNhdfiQPE';
        
        // 內建隨機小圖示庫（網頁會自動幫每篇文章分配不同的文青風圖示）
        const icons = ["🌿", "📖", "🌲", "🍁", "🌸", "☕", "📝", "🌾", "⛰️", "🦉", "🎨", "🌊"];

        async function fetchArticles() {
            const container = document.getElementById('article-container');
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;

            try {
                const response = await fetch(url);
                const text = await response.text();
                
                // 解析 Google 試算表特有的 JSON 格式
                const jsonText = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonText);
                const rows = data.table.rows;

                if (!rows || rows.length === 0) {
                    container.innerHTML = '<div class="status-msg">目前還沒有收藏的文章。</div>';
                    return;
                }

                let htmlContent = '';
                
                // 逐行讀取試算表（最新填寫的文章會排在最上面）
                for (let i = rows.length - 1; i >= 0; i--) {
                    const row = rows[i];
                    
                    // 假設表單產生的欄位：時間戳記(A欄)、文章標題(B欄)、文章網址(C欄)
                    const title = row.c[1] ? row.c[1].v : '';
                    const articleUrl = row.c[2] ? row.c[2].v : '';

                    if (title && articleUrl) {
                        // 根據文章索引隨機或按順序挑選一個 icon
                        const icon = icons[i % icons.length];

                        htmlContent += `
                            <a href="${articleUrl}" target="_blank" class="article-item">
                                <div class="icon">${icon}</div>
                                <div class="content">
                                    <div class="title">${title}</div>
                                    <div class="url-box">
                                        <span class="url-text">${articleUrl}</span>
                                    </div>
                                </div>
                            </a>
                        `;
                    }
                }

                container.innerHTML = htmlContent;

            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="status-msg">讀取文章失敗，請檢查試算表 ID 是否正確並已發佈到網路。</div>';
            }
        }

        // 網頁開啟時自動執行
        fetchArticles();
    </script>
</body>
</html>
